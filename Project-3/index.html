<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown & Quotes Application</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="slides-container" id="slidesContainer">

        <!-- Countdown Slide -->
        <section class="slide countdown-slide">
            <h1>Countdown to New Year 2027 🎉</h1>

            <div class="timer">
                <div>
                    <span id="days">00</span>
                    <p>Days</p>
                </div>

                <div>
                    <span id="hours">00</span>
                    <p>Hours</p>
                </div>

                <div>
                    <span id="minutes">00</span>
                    <p>Minutes</p>
                </div>

                <div>
                    <span id="seconds">00</span>
                    <p>Seconds</p>
                </div>
            </div>

            <p id="countdownStatus">Timer is running.</p>

            <button id="toggleCountdown">
                Pause Countdown
            </button>
        </section>

        <!-- Quotes will be added dynamically here -->

    </div>

    <div class="controls">
        <button id="prevSlide">Previous</button>

        <span id="slideCounter">
            Slide 1 of 1
        </span>

        <button id="nextSlide">Next</button>
    </div>

    <div class="modal" id="welcomeModal">
        <div class="modal-box">

            <button
                id="closeModal"
                aria-label="Close Modal"
            >
                &times;
            </button>

            <h2>Welcome to Countdown & Quotes App 🚀</h2>

            <p>
                Stay motivated and enjoy each slide!
            </p>

        </div>
    </div>

    <script src="./java.js"></script>

</body>
</html>
