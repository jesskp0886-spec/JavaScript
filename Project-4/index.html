<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Lifestyle Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
    <body>
        <!-- START PAGE -->
        <div class="start-screen" id="startScreen">
            <h1>Aesthetic Lifestyle & Philosophy Quiz</h1>

            <p>
                Discover your personality,
                values, and mindset through a minimalist lifestyle quiz.
            </p>

            <button id="startBtn">Start Quiz</button>
        </div>

        <!-- QUIZ PAGE -->
        <div class="quiz-container hidden" id="quizContainer">

            <div class="top-bar">
                <h2>Aesthetic Lifestyle Quiz</h2>

                <div class="timer">
                    <i class="fa-solid fa-hourglass-half"></i>
                    <span id="time">10</span>s
                </div>
            </div>

            <div class="progress">
                <div class="progress-bar"></div>
            </div>

            <h1 id="question"></h1>

            <div class="options">
                <button class="option" onclick="selectAnswer(0)">
                    <div class="letter">A</div>
                    <div class="text" id="option0"></div>
                </button>

                <button class="option" onclick="selectAnswer(1)">
                    <div class="letter">B</div>
                    <div class="text" id="option1"></div>
                </button>

                <button class="option" onclick="selectAnswer(2)">
                    <div class="letter">C</div>
                    <div class="text" id="option2"></div>
                </button>

                <button class="option" onclick="selectAnswer(3)">
                    <div class="letter">D</div>
                    <div class="text" id="option3"></div>
                </button>
            </div>

            <div class="bottom-section">
                <p id="questionCount"></p>

                <button id="nextBtn">Next <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
